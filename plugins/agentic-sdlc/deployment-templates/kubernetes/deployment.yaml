# Template Deployment — replace {{PLACEHOLDER}} values before apply or use Helm chart in this repo.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{APP_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    app.kubernetes.io/name: {{APP_NAME}}
    app.kubernetes.io/instance: {{RELEASE_NAME}}
    app.kubernetes.io/version: "{{APP_VERSION}}"
    app.kubernetes.io/managed-by: {{MANAGED_BY}}
spec:
  replicas: {{REPLICA_COUNT}}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: {{APP_NAME}}
      app.kubernetes.io/instance: {{RELEASE_NAME}}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{APP_NAME}}
        app.kubernetes.io/instance: {{RELEASE_NAME}}
    spec:
      serviceAccountName: {{SERVICE_ACCOUNT_NAME}}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{APP_NAME}}
          image: "{{IMAGE_REPOSITORY}}:{{IMAGE_TAG}}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{CONTAINER_PORT}}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{CONFIGMAP_NAME}}
                optional: true
            - secretRef:
                name: {{SECRET_NAME}}
                optional: true
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: "{{CPU_REQUEST}}"
              memory: "{{MEMORY_REQUEST}}"
            limits:
              cpu: "{{CPU_LIMIT}}"
              memory: "{{MEMORY_LIMIT}}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
          startupProbe:
            httpGet:
              path: {{STARTUP_HTTP_PATH}}
              port: http
            failureThreshold: {{STARTUP_FAILURE_THRESHOLD}}
            periodSeconds: {{STARTUP_PERIOD_SECONDS}}
            timeoutSeconds: {{STARTUP_TIMEOUT_SECONDS}}
          livenessProbe:
            httpGet:
              path: {{LIVENESS_HTTP_PATH}}
              port: http
            initialDelaySeconds: {{LIVENESS_INITIAL_DELAY}}
            periodSeconds: {{LIVENESS_PERIOD_SECONDS}}
            timeoutSeconds: {{LIVENESS_TIMEOUT_SECONDS}}
            failureThreshold: {{LIVENESS_FAILURE_THRESHOLD}}
          readinessProbe:
            httpGet:
              path: {{READINESS_HTTP_PATH}}
              port: http
            periodSeconds: {{READINESS_PERIOD_SECONDS}}
            timeoutSeconds: {{READINESS_TIMEOUT_SECONDS}}
            failureThreshold: {{READINESS_FAILURE_THRESHOLD}}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: {{APP_NAME}}
                    app.kubernetes.io/instance: {{RELEASE_NAME}}
                topologyKey: kubernetes.io/hostname
