# Template Service — replace {{PLACEHOLDER}} values.
apiVersion: v1
kind: Service
metadata:
  name: {{APP_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    app.kubernetes.io/name: {{APP_NAME}}
    app.kubernetes.io/instance: {{RELEASE_NAME}}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{APP_NAME}}
    app.kubernetes.io/instance: {{RELEASE_NAME}}
  ports:
    - name: http
      port: {{SERVICE_PORT}}
      targetPort: {{CONTAINER_PORT}}
      protocol: TCP
