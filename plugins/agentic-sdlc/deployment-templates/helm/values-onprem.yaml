# On-premises — local registry, generic ingress, manual TLS, no cloud-specific integrations.
image:
  repository: registry.internal.example.com/team/your-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: internal-registry-credentials

ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Manual TLS: create TLS secret from corporate CA / cert files
  hosts:
    - host: app.corp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: app-onprem-tls
      hosts:
        - app.corp.example.com

# No cloud CSI drivers — mount secrets via Kubernetes Secrets or external vault agent if used
existingSecret: "app-onprem-credentials"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
