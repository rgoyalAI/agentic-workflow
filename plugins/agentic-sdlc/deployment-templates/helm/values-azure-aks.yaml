# Azure AKS — ACR, Key Vault CSI, Application Gateway ingress, Azure Monitor.
image:
  repository: youracr.azurecr.io/team/your-app
  tag: "1.0.0"

imagePullSecrets:
  - name: acr-pull

serviceAccount:
  create: true
  annotations:
    azure.workload.identity/client-id: "{{AZURE_WORKLOAD_IDENTITY_CLIENT_ID}}"

podAnnotations:
  # Log Analytics / Azure Monitor (adapt to your agent)
  azure.workload.identity/use: "true"

ingress:
  enabled: true
  className: azure-application-gateway
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/use-private-ip: "false"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: app.prod.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: app-aksssl
      hosts:
        - app.prod.example.com

extraVolumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: azure-kvname

extraVolumeMounts:
  - name: secrets-store-inline
    mountPath: /mnt/secrets-store
    readOnly: true
