# Development overrides — debug-friendly, single replica, no ingress.
replicaCount: 1

config:
  data:
    LOG_LEVEL: "debug"
    APP_ENV: "development"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: false

autoscaling:
  enabled: false

# Relaxed probes for faster iteration (tune per app)
livenessProbe:
  initialDelaySeconds: 10
readinessProbe:
  periodSeconds: 10
