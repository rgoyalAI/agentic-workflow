# Production — HA, strict sizing, PDB via workload policy, HPA, TLS ingress.
replicaCount: 3

config:
  data:
    LOG_LEVEL: "warn"
    APP_ENV: "production"

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 1Gi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: app-prod-tls
      hosts:
        - app.example.com

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

# Enforce PodDisruptionBudget via platform policy or separate manifest; minAvailable should match HA needs.
# Example: kubectl apply -f pdb.yaml with minAvailable: 2 when replicas >= 3

# Spread across nodes/zones — the chart template adds default pod anti-affinity; override here if needed.
affinity: {}
