# Staging — production-like behavior at smaller scale.
replicaCount: 2

config:
  data:
    LOG_LEVEL: "info"
    APP_ENV: "staging"

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 768Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: app.staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: app-staging-tls
      hosts:
        - app.staging.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 65
  targetMemoryUtilizationPercentage: 75
