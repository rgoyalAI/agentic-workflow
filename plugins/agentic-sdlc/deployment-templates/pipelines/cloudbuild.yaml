# Google Cloud Build — test, build image, push to Artifact Registry, deploy to GKE.
# Store as `cloudbuild.yaml` in repo root or pass path in trigger.
#
# Substitutions (_REGION, _REPO, _CLUSTER, _ZONE) must be defined on the trigger or below.

substitutions:
  _REGION: us-central1
  _REPO: apps
  _IMAGE_NAME: your-app
  _CLUSTER: your-gke-cluster
  _ZONE: us-central1-a
  _K8S_NAMESPACE: production
  _HELM_RELEASE: your-app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # --- Lint & test ---
  - id: unit-tests
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        echo "Replace with Cloud Build community builders or your test container"
        # e.g. run tests in a language-specific image:
        # docker run --rm -v "$PWD:/w" -w /w python:3.12-slim bash -c "pip install -r requirements.txt && pytest"

  # --- Build and push image (Kaniko) ---
  - id: build-image
    name: gcr.io/kaniko-project/executor:latest
    args:
      - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
      - --destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:latest
      - --cache=true
      - --cache-ttl=168h
      - --context=dir:///workspace
      - --dockerfile=Dockerfile
    waitFor:
      - unit-tests

  # --- Vulnerability scan (Trivy against Artifact Registry with gcloud token) ---
  - id: scan-image
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        apt-get update -qq && apt-get install -y -qq wget >/dev/null
        wget -qO - https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
        export TRIVY_USERNAME=oauth2accesstoken
        export TRIVY_PASSWORD="$(gcloud auth print-access-token)"
        trivy image --exit-code 1 --severity HIGH,CRITICAL \
          "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:${SHORT_SHA}"
    waitFor:
      - build-image

  # --- Get GKE credentials and deploy ---
  - id: deploy-gke
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud container clusters get-credentials ${_CLUSTER} --zone ${_ZONE} --project ${PROJECT_ID}
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        helm upgrade --install ${_HELM_RELEASE} deployment-templates/helm \
          --namespace ${_K8S_NAMESPACE} \
          --create-namespace \
          -f deployment-templates/helm/values.yaml \
          -f deployment-templates/helm/values-gcp-gke.yaml \
          -f deployment-templates/helm/values-prod.yaml \
          --set image.repository=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME} \
          --set image.tag=${SHORT_SHA}
    waitFor:
      - scan-image

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE_NAME}:${SHORT_SHA}

timeout: 1200s
