# Reusable GitHub Actions workflow — build, test, container image, Trivy scan, deploy to Kubernetes.
# Path: .github/workflows/docker-build-deploy.yaml (rename/adjust as needed)
# Configure repository secrets: REGISTRY_LOGIN (if not OIDC), KUBE_CONFIG (only if not using OIDC to cluster)
#
# Inputs:
#   registry: acr | ecr | gar
#   environment: staging | production

name: Build Test Publish Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      registry:
        description: "Target container registry"
        required: true
        default: "acr"
        type: choice
        options:
          - acr
          - ecr
          - gar
      deploy_env:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  IMAGE_NAME: ${{ github.event.repository.name }}
  REGISTRY: ${{ vars.REGISTRY_HOST }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run linters
        run: |
          echo "Add language-specific linters (ESLint, Ruff, dotnet format, etc.)"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - name: Unit tests
        run: |
          echo "Replace with your test command"

  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- OIDC: pick ONE cloud login path per registry input ---
      - name: Azure login (OIDC)
        if: github.event.inputs.registry == 'acr' || (github.event_name != 'workflow_dispatch' && vars.DEFAULT_REGISTRY == 'acr')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: success()
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Configure AWS credentials (OIDC)
        if: github.event.inputs.registry == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event.inputs.registry == 'ecr'
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Authenticate to Google Cloud (OIDC)
        if: github.event.inputs.registry == 'gar'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GAR
        if: github.event.inputs.registry == 'gar'
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Trivy scan
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy on image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [scan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: ${{ github.event.inputs.deploy_env || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure / kubectl context (OIDC)
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}
        # Prefer: Azure kubelogin + OIDC, AWS eks update-kubeconfig, or gcloud container clusters get-credentials

      - name: Helm upgrade
        run: |
          helm upgrade --install "${{ env.IMAGE_NAME }}" ./deployment-templates/helm \
            --namespace "${{ vars.K8S_NAMESPACE }}" \
            --create-namespace \
            -f deployment-templates/helm/values.yaml \
            -f deployment-templates/helm/values-${{ github.event.inputs.deploy_env || 'staging' }}.yaml \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ github.sha }}
